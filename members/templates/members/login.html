{% extends 'members/home.html' %}

{% block link_nav %}
<nav style="background-color:blue">

    </nav>
    {% endblock %}
{% block title %}Inscription CSG{% endblock %}
{% block content %}
<div class="login-container">
    <h2>Connexion Profile CSG</h2>
    {% if error_message %}
    <p class="error-message">{{ error_message }}</p>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>email</label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn-login">connect</button>
    </form>
</div>
{% endblock %}
