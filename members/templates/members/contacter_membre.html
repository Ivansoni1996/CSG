{% extends 'members/accueil.html' %}
{% block link_nav %}
    {% endblock %}
{% block content %}
<div class="container">
    <h2>Contacter {{ membre.prenom }} {{ membre.nom }}</h2>
    <p>Email du destinataire : <strong>{{ membre.email }}</strong></p>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Envoyer l'e-mail</button>
        <a href="{% url 'liste_membres' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
