{% extends 'members/accueil.html' %}

{% block title %}Inscription CSG{% endblock %}
{% block content %}
    {% if messages %}
    <div class="messages" style="padding: 15px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px; margin-bottom: 20px;">
        {% for message in messages %}
                {{ message }}
        {% endfor %}
    </div>
    {% endif %}
    <div class="card">
        <h2>Inscrire un membre (RPNG)</h2>
        <form method="post">
            {% csrf_token %} {{ form.as_p }}
            <button type="submit" class="btn">Ajouter</button>
        </form>
{% endblock %}
